services:
  # ─── BASE DE DATOS PRODUCCIÓN ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: gymsmart-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # En producción NO se expone el puerto al host: acceso solo interno
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - internal-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS (RATE LIMITING + IDEMPOTENCIA) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gymsmart-redis-prod
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - internal-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ─── NESTJS API PRODUCCIÓN (SIN BIND MOUNTS) ──────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: gymsmart-api-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    # IMPORTANTE: Sin volúmenes de host — el código corre compilado en la imagen
    env_file:
      - ./backend/.env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=3000
      - NODE_ENV=production
      - TZ=America/Lima
      # Optimización del recolector de basura V8 para servidores con RAM limitada
      - NODE_OPTIONS=--max-old-space-size=768
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"
    networks:
      - internal-net
      - public-net
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
        reservations:
          memory: 512M

  # ─── FLUTTER WEB (PRODUCCIÓN COMPILADA) ───────────────────────────
  frontend-web:
    build:
      context: ./mobile_app
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_ENV: production
        APP_MODE: backend
        ENABLE_QR_SIMULATOR: "false"
        API_BASE_URL: ${API_BASE_URL}
    container_name: sas_gym_flutter_web_prod
    ports:
      - "8383:80"
    restart: unless-stopped
    networks:
      - public-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ─── WEB ADMIN + PROTOTIPOS ───────────────────────────────────────
  web:
    image: nginx:alpine
    container_name: sas_gym_frontend_prod
    ports:
      - "8282:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./web_admin:/usr/share/nginx/html/web:ro
      - ./docs:/usr/share/nginx/html/docs:ro
    restart: unless-stopped
    networks:
      - public-net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

networks:
  internal-net:
    driver: bridge
    internal: true
  public-net:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:

name: web-smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-web-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Static smoke
        run: node scripts/web-smoke-check.mjs

name: flutter

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build web
        run: flutter build web --release --no-wasm-dry-run --dart-define=APP_ENV=ci --dart-define=APP_MODE=backend --dart-define=API_BASE_URL=http://localhost:3000/api/v1

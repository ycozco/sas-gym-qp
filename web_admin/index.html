<!doctype html>
<html lang="es" data-theme="system">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SaasGym Club Ops</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>
<script>
  (function () {
    const key = "sasgym.theme";
    const value = localStorage.getItem(key) || "system";
    document.documentElement.dataset.theme = value;
  })();
</script>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- App: el orden importa (shared y data exponen globals que el resto consume) -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="dashboards.jsx"></script>

<!-- Segmented features -->
<script type="text/babel" src="src/features/dashboard/Dashboard.jsx"></script>
<script type="text/babel" src="src/features/members/Socios.jsx"></script>
<script type="text/babel" src="src/features/payments/Pagos.jsx"></script>
<script type="text/babel" src="src/features/attendance/Asistencia.jsx"></script>

<script type="text/babel" src="src/features/memberships/Membresias.jsx"></script>
<script type="text/babel" src="src/features/cashier/Caja.jsx"></script>
<script type="text/babel" src="src/features/finances/Finanzas.jsx"></script>
<script type="text/babel" src="src/features/points/Puntos.jsx"></script>

<script type="text/babel" src="src/features/workouts/Entrenamientos.jsx"></script>
<script type="text/babel" src="src/features/crm/CRM.jsx"></script>
<script type="text/babel" src="src/features/diets/Dietas.jsx"></script>
<script type="text/babel" src="src/features/gyms/Gimnasios.jsx"></script>
<script type="text/babel" src="src/features/saas/PlanesSaaS.jsx"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>

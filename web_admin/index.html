<!doctype html>
<html lang="es" data-theme="system">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GymSmart — Panel Web Admin Real</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>
<script>
  (function () {
    const key = "sasgym.theme";
    const value = localStorage.getItem(key) || "system";
    document.documentElement.dataset.theme = value;
  })();
</script>
</head>

<div id="root"></div>

<!-- React + Babel -->

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- App: el orden importa (shared y data exponen globals que el resto consume) -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="dashboards.jsx"></script>
<script type="text/babel" src="modules.jsx"></script>

services:
  # ─── BASE DE DATOS (AISLADA EN RED INTERNA) ──────────────────────
  db:
    image: postgres:15-alpine
    container_name: gymsmart-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
      POSTGRES_DB: gymsmart
    # Se expone el puerto 5432 enlazado ÚNICAMENTE al localhost del host.
    # Esto previene que contenedores de redes públicas u otros equipos de la LAN
    # accedan a PostgreSQL, pero permite mantenimiento local.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gymsmart"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── NESTJS BACKEND API (NEXO ENTRE RED INTERNA Y PÚBLICA) ───────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymsmart-api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_password@db:5432/gymsmart?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - TZ=America/Lima # Forzar zona horaria en el contenedor para turnos POS
      - ENABLE_QR_SIMULATOR=true
      - ALLOW_TEST_DATA_RESET=true
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run start:dev"
    networks:
      - internal-net
      - public-net

  # ─── FLUTTER WEB APP (RED PÚBLICA) ──────────────────────────────────
  frontend-web:
    build:
      context: ./mobile_app
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_ENV: dev
        APP_MODE: backend
        ENABLE_QR_SIMULATOR: "true"
        API_BASE_URL: http://localhost:3000/api/v1
    container_name: sas_gym_flutter_web
    ports:
      - "8383:80"
    restart: unless-stopped
    networks:
      - public-net

  # ─── FLUTTER CI (analyze + test) ─────────────────────────────────
  # Servicio de validación: corre flutter analyze + flutter test dentro
  # del contenedor. Uso: docker compose build flutter-ci
  flutter-ci:
    build:
      context: ./mobile_app
      dockerfile: Dockerfile
      target: ci
    image: sas_gym_flutter_ci:latest
    profiles: ["ci"]

  # ─── WEB ADMIN REAL + NAVIGATOR HUB & STATIC PROTOTYPES (RED PÚBLICA) ──
  web:
    image: nginx:alpine
    container_name: sas_gym_frontend
    ports:
      - "8282:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./web_admin:/usr/share/nginx/html/web:ro
      - ./mockups/mobile:/usr/share/nginx/html/mockups/mobile:ro
      - ./mockups/web:/usr/share/nginx/html/mockups/web:ro
      - ./docs:/usr/share/nginx/html/docs:ro
    restart: unless-stopped
    networks:
      - public-net

  # ─── CLIENTE DE PRUEBAS AISLADO (FUERA DE LA RED PROPIA) ───────────
  test-client:
    image: curlimages/curl:latest
    container_name: gymsmart-test-client
    # Mantiene el contenedor en ejecución para poder ejecutar comandos exec
    command: sh -c "sleep 3600"
    networks:
      - external-test-net

  # ─── CACHÉ / SEGURIDAD (REDIS EN RED INTERNA) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: gymsmart-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal-net

networks:
  # Red aislada interna: solo accesible por db y api. No tiene salida externa.
  internal-net:
    driver: bridge
    internal: true

  # Red pública de servicios: accesible por api, frontend-web y prototipos
  public-net:
    driver: bridge

  # Red externa de pruebas aislada: simula un cliente externo (fuera de la red)
  external-test-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

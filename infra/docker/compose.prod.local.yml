name: sasgym-prod-local

services:
  postgres:
    image: postgres:16.14-alpine3.24@sha256:df4e3a4e9bbf29a6744c80327f272379b32b88b22a001fb1cfbfcd0ef81e4b
    container_name: sasgym_postgres_prod_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sasgym_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sasgym_backend

  redis:
    image: redis:7.2-alpine@sha256:0d5bdfdf8e98679d63c5fd3cfd5d0f6fd35a09c252ef0f117c464a3875dc06cfc
    container_name: sasgym_redis_prod_local
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - sasgym_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sasgym_backend

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: sasgym_api_prod_local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      HUELLA_SECRET_KEY: ${HUELLA_SECRET_KEY}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000/api/v1}
      APP_URL: ${APP_URL:-http://localhost:8383}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:8282}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8383,http://localhost:8282}
      PUBLIC_UPLOADS_ENABLED: ${PUBLIC_UPLOADS_ENABLED:-false}
      PRESENTATION_TENANT_COUNT: ${PRESENTATION_TENANT_COUNT:-4}
      PRESENTATION_SUPER_TENANT_ID: ${PRESENTATION_SUPER_TENANT_ID}
      PRESENTATION_SUPERADMIN_PASSWORD: ${PRESENTATION_SUPERADMIN_PASSWORD}
      PRESENTATION_ADMIN_PASSWORD: ${PRESENTATION_ADMIN_PASSWORD}
      PRESENTATION_TRAINER_PASSWORD: ${PRESENTATION_TRAINER_PASSWORD}
      PRESENTATION_CASHIER_PASSWORD: ${PRESENTATION_CASHIER_PASSWORD}
      PRESENTATION_MEMBER_PASSWORD: ${PRESENTATION_MEMBER_PASSWORD}
      PRESENTATION_TENANT_1_ID: ${PRESENTATION_TENANT_1_ID}
      PRESENTATION_TENANT_2_ID: ${PRESENTATION_TENANT_2_ID}
      PRESENTATION_TENANT_3_ID: ${PRESENTATION_TENANT_3_ID}
      PRESENTATION_TENANT_4_ID: ${PRESENTATION_TENANT_4_ID}
    command: >
      sh -c "npx prisma migrate deploy &&
      npm run data:reconcile &&
      node dist/main"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/readiness | grep -q '\"status\":\"ready\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - sasgym_backend
      - sasgym_public_local

  ws:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: sasgym_ws_prod_local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      WS_MODE: "true"
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      HUELLA_SECRET_KEY: ${HUELLA_SECRET_KEY}
      WS_URL: ${WS_URL:-ws://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8383,http://localhost:8282}
      PRESENTATION_TENANT_COUNT: ${PRESENTATION_TENANT_COUNT:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WS_PORT:-3001}:3001"
    networks:
      - sasgym_backend
      - sasgym_public_local

  app-web:
    build:
      context: ../../mobile_app
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_ENV: production
        APP_MODE: backend
        ENABLE_QR_SIMULATOR: "false"
        API_BASE_URL: ${API_BASE_URL:-http://localhost:3000/api/v1}
    container_name: sasgym_app_web_prod_local
    restart: unless-stopped
    ports:
      - "${APP_WEB_PORT:-8383}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sasgym_public_local

  admin-web:
    build:
      context: ../../web_admin
      dockerfile: Dockerfile
    container_name: sasgym_admin_web_prod_local
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-8282}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sasgym_public_local

volumes:
  sasgym_pgdata:
  sasgym_redisdata:

networks:
  sasgym_backend:
    driver: bridge
    internal: true
  sasgym_public_local:
    driver: bridge

name: sasgym-prod

services:
  postgres:
    image: postgres:16.14-alpine
    container_name: sasgym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sasgym_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sasgym_backend

  redis:
    image: redis:7.4.8-alpine
    container_name: sasgym_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - sasgym_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sasgym_backend

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: sasgym_api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      HUELLA_SECRET_KEY: ${HUELLA_SECRET_KEY}
      API_BASE_URL: ${API_BASE_URL}
      APP_URL: ${APP_URL}
      ADMIN_URL: ${ADMIN_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PUBLIC_UPLOADS_ENABLED: ${PUBLIC_UPLOADS_ENABLED:-false}
      PRESENTATION_TENANT_COUNT: ${PRESENTATION_TENANT_COUNT:-4}
      PRESENTATION_SUPER_TENANT_ID: ${PRESENTATION_SUPER_TENANT_ID}
      PRESENTATION_SUPERADMIN_PASSWORD: ${PRESENTATION_SUPERADMIN_PASSWORD}
      PRESENTATION_ADMIN_PASSWORD: ${PRESENTATION_ADMIN_PASSWORD}
      PRESENTATION_TRAINER_PASSWORD: ${PRESENTATION_TRAINER_PASSWORD}
      PRESENTATION_CASHIER_PASSWORD: ${PRESENTATION_CASHIER_PASSWORD}
      PRESENTATION_MEMBER_PASSWORD: ${PRESENTATION_MEMBER_PASSWORD}
      PRESENTATION_TENANT_1_ID: ${PRESENTATION_TENANT_1_ID}
      PRESENTATION_TENANT_2_ID: ${PRESENTATION_TENANT_2_ID}
      PRESENTATION_TENANT_3_ID: ${PRESENTATION_TENANT_3_ID}
      PRESENTATION_TENANT_4_ID: ${PRESENTATION_TENANT_4_ID}
    command: >
      sh -c "npx prisma db push --skip-generate &&
      npm run seed:prod &&
      npm run data:reconcile &&
      node dist/main"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/readiness | grep -q '\"status\":\"ready\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sasgym_backend
      - proxy_external

  ws:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: sasgym_ws
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      WS_MODE: "true"
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      HUELLA_SECRET_KEY: ${HUELLA_SECRET_KEY}
      WS_URL: ${WS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PRESENTATION_TENANT_COUNT: ${PRESENTATION_TENANT_COUNT:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sasgym_backend
      - proxy_external

  app-web:
    build:
      context: ../../web_admin
      dockerfile: Dockerfile
    container_name: sasgym_app_web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proxy_external

  admin-web:
    image: nginx:1.31.1-alpine
    container_name: sasgym_admin_web
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ../../backend/public/landing:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy_external

volumes:
  sasgym_pgdata:
  sasgym_redisdata:

networks:
  sasgym_backend:
    driver: bridge
    internal: true

  proxy_external:
    external: true
    name: ${EXTERNAL_PROXY_NETWORK}
